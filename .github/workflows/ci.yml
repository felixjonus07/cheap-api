name: CI — Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    name: Rust Core (clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cheap-api-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cheap-api-core/Cargo.lock') }}
      - name: Clippy
        working-directory: cheap-api-core
        run: cargo clippy --all-targets --features node -- -D warnings
      - name: Format check
        working-directory: cheap-api-core
        run: cargo fmt --check
      - name: Test
        working-directory: cheap-api-core
        run: cargo test --features node

  python:
    name: Python SDK (build check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "maturin>=1.0,<2.0"
      - name: Build wheel (debug)
        working-directory: cheap-api-python
        run: maturin build --manifest-path ../cheap-api-core/Cargo.toml --features python

  node:
    name: Node SDK (build check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install napi-rs CLI globally
        run: npm install -g @napi-rs/cli@2
      - name: Install dependencies
        working-directory: cheap-api-node
        run: npm ci
      - name: Build native addon
        working-directory: cheap-api-node
        run: napi build --platform --release --cargo-cwd ../cheap-api-core --features node .
