name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - "py-v*"

permissions:
  contents: read
  id-token: write

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install maturin
        run: pip install "maturin>=1.0,<2.0"

      - name: Build wheel
        working-directory: cheap-api-python
        run: |
          maturin build --release --target ${{ matrix.target }} --out dist --manifest-path ../cheap-api-core/Cargo.toml --features "python,pyo3/extension-module"
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: cheap-api-python/dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - run: pip install "maturin>=1.0,<2.0"
      - name: Build sdist
        working-directory: cheap-api-python
        run: maturin sdist --out dist --manifest-path ../cheap-api-core/Cargo.toml --features "python,pyo3/extension-module"
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: cheap-api-python/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
