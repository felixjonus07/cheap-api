name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - "py-v*"   # trigger on tags like py-v0.1.0

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build native wheels for each platform / Python version
  # ─────────────────────────────────────────────────────────────────────────────
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python: "3.11"

          # macOS ARM (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            python: "3.11"

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            python: "3.11"

          # Linux x64 (glibc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python: "3.11"

          # Linux ARM64 (glibc) — cross compiled
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            python: "3.11"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cross-compilation support for Linux ARM
      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install maturin
        run: pip install "maturin>=1.0,<2.0"

      - name: Build wheel
        working-directory: cheap-api-python
        run: |
          maturin build --release --target ${{ matrix.target }} --out dist
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: cheap-api-python/dist/*.whl

  # ─────────────────────────────────────────────────────────────────────────────
  # Build the pure-Python sdist (source distribution)
  # ─────────────────────────────────────────────────────────────────────────────
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "maturin>=1.0,<2.0"
      - name: Build sdist
        working-directory: cheap-api-python
        run: maturin sdist --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: cheap-api-python/dist/*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────────
  # Upload everything to PyPI
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment: pypi          # optional: add a "pypi" environment in GitHub Settings
    permissions:
      id-token: write          # required for trusted publishing (OIDC)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Trusted publishing (no password needed — configure on pypi.org)
          # If you prefer an API token, uncomment and set PYPI_TOKEN secret:
          # password: ${{ secrets.PYPI_TOKEN }}
