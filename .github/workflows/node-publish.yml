name: Publish Node SDK to npm

on:
  push:
    tags:
      - "node-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install napi-rs CLI globally
        run: npm install -g @napi-rs/cli@2

      - name: Install node dependencies
        working-directory: cheap-api-node
        run: npm ci

      - name: Build native addon (cross-compile)
        working-directory: cheap-api-node
        run: |
          napi build --platform --release --target ${{ matrix.target }} --cargo-cwd ../cheap-api-core --features node .
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.target }}
          path: cheap-api-node/*.node

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install node dependencies
        working-directory: cheap-api-node
        run: npm ci

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: cheap-api-node
          pattern: binding-*
          merge-multiple: true

      - name: List collected binaries
        working-directory: cheap-api-node
        run: ls -la *.node

      - name: Publish to npm
        working-directory: cheap-api-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
