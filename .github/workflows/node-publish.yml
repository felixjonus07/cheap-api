name: Publish Node SDK to npm

on:
  push:
    tags:
      - "node-v*"   # trigger on tags like node-v0.1.0

permissions:
  contents: write   # needed to upload release assets

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build native .node addons for each platform
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build

          # macOS ARM (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            build: npm run build -- --target aarch64-apple-darwin

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            build: npm run build -- --target x86_64-apple-darwin

          # Linux x64 (glibc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build

          # Linux ARM64 (glibc)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: cheap-api-node
        run: npm ci

      - name: Build native addon
        working-directory: cheap-api-node
        run: ${{ matrix.build }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.target }}
          path: cheap-api-node/*.node

  # ─────────────────────────────────────────────────────────────────────────────
  # Collect all platform binaries and publish to npm
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: cheap-api-node
        run: npm ci

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: cheap-api-node
          pattern: binding-*
          merge-multiple: true

      - name: List collected binaries
        working-directory: cheap-api-node
        run: ls -la *.node

      - name: Publish to npm
        working-directory: cheap-api-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
